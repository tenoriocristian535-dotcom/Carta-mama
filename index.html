<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dedicatoria</title>

<style>

body{
    margin: 0;
    padding: 0;
    background: linear-gradient(to bottom, #ffb6d5, #ffeef5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.mensaje{
    text-align: center;

    animation: aparecer 2s ease;
}

h1{
    color: #ff3f7a;
    font-size: 60px;

    animation: brillo 2s infinite alternate;
}

p{
    font-size: 30px;
    color: #555;
}

/* Corazones */

.corazon{
    position: absolute;
    font-size: 30px;

    animation: subir 5s linear infinite;
}

.c1{
    left: 20%;
}

.c2{
    left: 40%;
    animation-duration: 7s;
}

.c3{
    left: 60%;
    animation-duration: 6s;
}

.c4{
    left: 80%;
    animation-duration: 8s;
}

/* Animaciones */

@keyframes aparecer{

    from{
        opacity: 0;
        transform: scale(0.5);
    }

    to{
        opacity: 1;
        transform: scale(1);
    }
}

@keyframes brillo{

    from{
        text-shadow: 0px 0px 10px pink;
    }

    to{
        text-shadow: 0px 0px 30px hotpink;
    }
}

@keyframes subir{

    0%{
        bottom: -50px;
        opacity: 1;
    }

    100%{
        bottom: 110%;
        opacity: 0;
    }
}

</style>
</head>

<body>

<div class="corazon c1">💖</div>
<div class="corazon c2">💕</div>
<div class="corazon c3">🌸</div>
<div class="corazon c4">💗</div>

<div class="mensaje">

<h1>Para ti mamá 💐</h1>

<p>
Con mucho amor,<br>
tu hija Mishel 💖
</p>

</div>

</body>
</html>
